# Token-efficient Codex orchestration defaults.
# Project subagent config is loaded only for trusted repos.

[features]
multi_agent = true

[agents]
# Lower than the Codex default to avoid wasteful fan-out.
# Raise only for large read-heavy audit/test waves.
max_threads = 4
# Root -> child fallback. Worker TOMLs also disable collaboration tools.
max_depth = 1
job_max_runtime_seconds = 2400

# Keep the root reasonable by default. Override only after classification.
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_verbosity = "medium"
model_reasoning_summary = "concise"
